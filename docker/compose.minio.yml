services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: doci
      MINIO_ROOT_PASSWORD: doci12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doci

  # One-shot: create the doci bucket and set a local-friendly 3-day object
  # expiry (lifecycle/ILM) so the volume doesn't grow unbounded. Replaces the
  # old manual "create the bucket before first use" step. Exits when done.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 doci doci12345 &&
        mc mb --ignore-existing local/doci &&
        mc ilm rule add local/doci --expire-days 3 || true ;
        mc ilm rule ls local/doci
    networks:
      - doci

volumes:
  minio_data:

networks:
  doci:
    name: doci