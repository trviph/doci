services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: doci
      POSTGRES_PASSWORD: doci
      POSTGRES_DB: doci
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U doci -d doci" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doci

volumes:
  postgres_data:

networks:
  doci:
    name: doci