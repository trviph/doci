services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: doci
      POSTGRES_PASSWORD: doci
      POSTGRES_DB: doci
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U doci -d doci" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doci

  # One-shot: apply Atlas migrations once Postgres is healthy (mirrors the
  # `atlas migrate apply` run by .github/workflows/migration-local.yml).
  # Idempotent — already-applied migrations are skipped. Exits when done.
  postgres-init:
    image: arigaio/atlas:latest
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - migrate
      - apply
      - --dir
      - file://migrations
      - --url
      - postgres://doci:doci@postgres:5432/doci?sslmode=disable
    working_dir: /work
    volumes:
      - ../migrations:/work/migrations:ro
    networks:
      - doci

volumes:
  postgres_data:

networks:
  doci:
    name: doci