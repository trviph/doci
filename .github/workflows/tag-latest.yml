name: Tag latest

# Promotes an already-published versioned image to the floating
# `ghcr.io/<owner>/<repo>:latest` tag.
#
# Trigger: a real GitHub Release is published (not just a tag push).
# Pre-release Releases are skipped, so v1.2.3-rc1 does not move :latest.
#
# Uses `docker buildx imagetools create` to alias the existing manifest
# rather than rebuilding — fast, and preserves whatever variants
# release.yml pushed.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing semver tag to promote (e.g. v1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: tag-latest
  cancel-in-progress: false

jobs:
  promote:
    # Skip pre-releases (v1.2.3-rc1, ...). For manual dispatch the user
    # has chosen the tag explicitly, so we trust them.
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote versioned image to :latest
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAG_NAME: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # metadata-action's {{version}} pattern strips the leading `v`,
          # so the versioned image tag is e.g. `1.2.3` not `v1.2.3`.
          VERSION="${TAG_NAME#v}"
          echo "Promoting ${IMAGE}:${VERSION} -> ${IMAGE}:latest"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}"
