name: Migration fix

on:
  workflow_run:
    workflows: ["Migration (local)"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: ariga/setup-atlas@v0

      - name: Refresh atlas.sum
        run: atlas migrate hash --dir "file://migrations"

      - name: Detect changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Open PR with fix
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/atlas-sum-${{ github.event.workflow_run.id }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: refresh atlas.sum"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: refresh atlas.sum" \
            --body "Automated atlas.sum refresh from [Migration (local) run #${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})." \
            --base main \
            --head "$BRANCH"

      - name: Nothing to fix
        if: steps.changes.outputs.changed == 'false'
        run: echo "::notice::Migration failed but atlas.sum is already current; manual review required."