name: Release

# On a semver tag push (v1.2.3, v1.2.3-rc1, ...), build linux/amd64 images
# for all three service variants and publish them to GitHub Container Registry.
#
# Images
#   ghcr.io/<owner>/<repo>/api        — API server     (Dockerfile.api)
#   ghcr.io/<owner>/<repo>/worker     — TaskIQ worker  (Dockerfile.worker)
#   ghcr.io/<owner>/<repo>/all-in-one — API + worker   (Dockerfile.all_in_one)
#
# Build order
#   1. build-base    : Dockerfile.base → /base:<sha>  (ephemeral; wires variants)
#   2. build-variants: Dockerfile.{api,worker,all_in_one} in parallel → semver tags
#
# The floating :latest tag is owned by tag-latest.yml — applied only on a real
# GitHub Release, so tagging-without-releasing never moves :latest.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-variants:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: /api
            file: docker/Dockerfile.api
          - suffix: /worker
            file: docker/Dockerfile.worker
          - suffix: /all-in-one
            file: docker/Dockerfile.all_in_one
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          flavor: latest=false
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: BASE_IMAGE=ghcr.io/${{ github.repository }}/base:${{ github.sha }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
